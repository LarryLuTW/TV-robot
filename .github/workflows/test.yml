name: CI

on:
  pull_request:
    branches: ["master"]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libxdo-dev

      - name: Build (release)
        run: cargo build --release --verbose

      - name: Smoke test (Unix)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          ./target/release/tv-robot &
          PID=$!
          sleep 3
          set -e
          curl -fsS http://localhost:3000/ >/dev/null
          PLATFORM=$(curl -fsS http://localhost:3000/api/platform)
          echo "Platform endpoint: $PLATFORM"
          case "${{ matrix.os }}" in
            macos-latest)  echo "$PLATFORM" | grep -q '"os":"macos"' ;;
            ubuntu-latest) echo "$PLATFORM" | grep -q '"os":"linux"' ;;
          esac
          kill $PID || true

      - name: Smoke test (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $proc = Start-Process -FilePath .\target\release\tv-robot.exe `
            -RedirectStandardOutput tv-robot.stdout.log `
            -RedirectStandardError  tv-robot.stderr.log `
            -PassThru
          # Wait up to 20s for the server to bind to port 3000.
          $ready = $false
          for ($i = 0; $i -lt 20; $i++) {
            Start-Sleep -Seconds 1
            if ($proc.HasExited) { break }
            try {
              $r = Invoke-WebRequest -Uri http://127.0.0.1:3000/ -UseBasicParsing -TimeoutSec 1
              if ($r.StatusCode -eq 200) { $ready = $true; break }
            } catch {}
          }
          Write-Host "----- stdout -----"
          if (Test-Path tv-robot.stdout.log) { Get-Content tv-robot.stdout.log }
          Write-Host "----- stderr -----"
          if (Test-Path tv-robot.stderr.log) { Get-Content tv-robot.stderr.log }
          Write-Host "------------------"
          try {
            if (-not $ready) { throw "Server did not become ready within 20s (HasExited=$($proc.HasExited))" }
            $platform = (Invoke-WebRequest -Uri http://127.0.0.1:3000/api/platform -UseBasicParsing).Content
            Write-Host "Platform endpoint: $platform"
            if ($platform -notmatch '"os":"windows"') { throw "Unexpected platform: $platform" }
          } finally {
            Stop-Process -Id $proc.Id -Force -ErrorAction SilentlyContinue
          }
